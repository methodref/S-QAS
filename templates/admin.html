<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题库管理 - 智能问答系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --success-color: #10b981;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--gray-50) 0%, #f0f0ff 100%);
            min-height: 100vh;
            padding: 24px;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding: 20px 0;
            border-bottom: 1px solid var(--gray-200);
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .logo {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 600;
        }
        h1 {
            color: var(--gray-800);
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-family: inherit;
            line-height: 1.4;
            white-space: nowrap;
            user-select: none;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .btn:focus-visible {
            outline: none;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.3);
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.5);
        }
        .btn-primary:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, var(--success-color), #059669);
            color: white;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.45);
        }
        .btn-success:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.35);
        }
        .btn-danger {
            background: linear-gradient(135deg, var(--danger-color), #dc2626);
            color: white;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.35);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.45);
        }
        .btn-danger:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
        }
        .btn-secondary {
            background: white;
            color: var(--gray-600);
            border: 1.5px solid var(--gray-200);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }
        .btn-secondary:hover {
            background: var(--gray-50);
            border-color: var(--primary-color);
            color: var(--primary-color);
            box-shadow: 0 6px 16px rgba(99, 102, 241, 0.18);
            transform: translateY(-1px);
        }
        .btn-secondary:active {
            transform: translateY(0);
            box-shadow: 0 3px 8px rgba(99, 102, 241, 0.12);
        }
        .btn-warning {
            background: linear-gradient(135deg, var(--warning-color), #d97706);
            color: white;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.35);
        }
        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.45);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }
        .btn-sm {
            padding: 7px 14px;
            font-size: 13px;
            border-radius: 8px;
        }
        .btn-icon-only {
            padding: 9px;
            border-radius: 10px;
        }
        .btn-outline-primary {
            background: transparent;
            color: var(--primary-color);
            border: 1.5px solid var(--primary-color);
        }
        .btn-outline-primary:hover {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 6px 18px rgba(99, 102, 241, 0.35);
            transform: translateY(-1px);
        }
        .btn-outline-danger {
            background: transparent;
            color: var(--danger-color);
            border: 1.5px solid var(--danger-color);
        }
        .btn-outline-danger:hover {
            background: var(--danger-color);
            color: white;
            box-shadow: 0 6px 18px rgba(239, 68, 68, 0.35);
            transform: translateY(-1px);
        }
        .btn-group {
            display: inline-flex;
            gap: 8px;
        }
        .btn-group .btn {
            border-radius: 10px;
        }
        .btn-group .btn:first-child:not(:last-child) {
            border-top-right-radius: 8px;
            border-bottom-right-radius: 8px;
        }
        .btn-group .btn:last-child:not(:first-child) {
            border-top-left-radius: 8px;
            border-bottom-left-radius: 8px;
        }
        .btn-group .btn:not(:first-child):not(:last-child) {
            border-radius: 8px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            overflow: hidden;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid var(--gray-100);
            background: var(--gray-50);
        }
        .card-header h3 {
            color: var(--gray-800);
            font-size: 15px;
            font-weight: 600;
        }
        .card-body {
            padding: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: var(--gray-600);
            font-weight: 500;
            font-size: 14px;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s ease;
            background: white;
        }
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--gray-100);
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            padding: 14px 24px;
            text-align: left;
            background: var(--gray-50);
            color: var(--gray-500);
            font-weight: 500;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--gray-100);
            color: var(--gray-700);
            font-size: 14px;
        }
        tr:hover {
            background: var(--gray-50);
        }
        tr.selected {
            background: rgba(99, 102, 241, 0.08);
        }
        .checkbox-cell {
            width: 40px;
        }
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }
        .category-tag {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            background: var(--gray-100);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            color: var(--gray-600);
        }
        .category-tag:hover {
            background: var(--gray-200);
        }
        .actions {
            display: flex;
            gap: 8px;
        }
        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
            border-radius: 6px;
        }
        .btn-icon {
            padding: 8px;
            border-radius: 6px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 24px;
            color: var(--gray-400);
        }
        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-state h4 {
            color: var(--gray-500);
            font-size: 16px;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px;
        }
        .back-link {
            color: var(--primary-color);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 32px;
            max-width: 520px;
            width: 90%;
            animation: slideUp 0.3s ease;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .modal-header h3 {
            color: var(--gray-800);
            font-size: 18px;
            font-weight: 600;
        }
        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--gray-100);
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            color: var(--gray-500);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .modal-close:hover {
            background: var(--gray-200);
            color: var(--gray-700);
        }
        .batch-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--gray-50);
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .batch-count {
            background: var(--primary-color);
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            padding-left: 40px;
            background: var(--gray-50);
            border-color: var(--gray-200);
        }
        .search-box svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 16px;
            color: var(--gray-400);
        }
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            padding: 16px 24px;
            border-top: 1px solid var(--gray-100);
        }
        .page-btn {
            width: 36px;
            height: 36px;
            border: 1px solid var(--gray-200);
            border-radius: 8px;
            background: white;
            cursor: pointer;
            font-size: 14px;
            color: var(--gray-600);
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--gray-50);
            border-color: var(--gray-300);
        }
        .page-btn.active {
            background: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }
        .page-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideUp {
            from { 
                opacity: 0;
                transform: translateY(20px);
            }
            to { 
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <div class="logo">QA</div>
                <h1>题库管理</h1>
            </div>
            <div class="header-right">
                <button class="btn btn-success" onclick="seedQuestions()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14"/>
                        <path d="M5 12h14"/>
                    </svg>
                    示例数据
                </button>
                <button class="btn btn-primary" onclick="openAddModal()">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 5v14"/>
                        <path d="M5 12h14"/>
                    </svg>
                    添加问题
                </button>
                <a href="/" class="btn btn-secondary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5"/>
                        <path d="M12 19l-7-7 7-7"/>
                    </svg>
                    返回
                </a>
            </div>
        </header>

        <div class="card">
            <div class="card-header">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="m21 21-4.35-4.35"/>
                    </svg>
                    <input type="text" id="searchInput" placeholder="搜索问题..." onkeyup="filterTable()">
                </div>
                <div class="header-actions" id="headerActions" style="display: none;">
                    <span class="batch-count" id="selectedCount">0</span>
                    <button class="btn btn-danger btn-sm" onclick="batchDelete()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 6h18"/>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/>
                        </svg>
                        批量删除
                    </button>
                    <button class="btn btn-secondary btn-sm" onclick="clearSelection()">
                        取消选择
                    </button>
                </div>
            </div>
            <div class="card-body">
                <table>
                    <thead>
                        <tr>
                            <th class="checkbox-cell">
                                <label class="checkbox-wrapper">
                                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                </label>
                            </th>
                            <th style="width: 35%;">问题</th>
                            <th style="width: 40%;">答案</th>
                            <th style="width: 15%;">分类</th>
                            <th style="width: 10%;">操作</th>
                        </tr>
                    </thead>
                    <tbody id="questionsTable">
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display: none;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <h4>暂无问题</h4>
                    <p>点击上方按钮添加问题或导入示例数据</p>
                </div>
            </div>
            <div class="pagination" id="pagination" style="display: none;">
                <button class="page-btn" id="prevBtn" onclick="prevPage()" disabled>上一页</button>
                <span id="pageInfo">第 1 页 / 共 1 页</span>
                <button class="page-btn" id="nextBtn" onclick="nextPage()" disabled>下一页</button>
            </div>
        </div>
    </div>

    <div class="modal" id="questionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">添加问题</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <form id="questionForm">
                <input type="hidden" id="questionId">
                <div class="form-group">
                    <label>问题</label>
                    <input type="text" id="question" required placeholder="请输入问题">
                </div>
                <div class="form-group">
                    <label>答案</label>
                    <textarea id="answer" required placeholder="请输入答案"></textarea>
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="category">
                        <option value="">请选择分类（可选）</option>
                        <option value="问候">问候</option>
                        <option value="介绍">介绍</option>
                        <option value="账户">账户</option>
                        <option value="帮助">帮助</option>
                        <option value="营业时间">营业时间</option>
                        <option value="服务">服务</option>
                        <option value="使用">使用</option>
                        <option value="反馈">反馈</option>
                        <option value="感谢">感谢</option>
                        <option value="告别">告别</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="confirmModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="modal-close" onclick="closeConfirmModal()">&times;</button>
            </div>
            <div class="batch-info" id="confirmMessage">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 9v2m0 4h.01"/>
                    <path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/>
                </svg>
                <span>确定要删除选中的 <span id="deleteCount">1</span> 个问题吗？</span>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                <button type="button" class="btn btn-danger" onclick="confirmDelete()">确定删除</button>
            </div>
        </div>
    </div>

    <script>
        let editingId = null;
        let selectedIds = [];
        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;
        let totalCount = 0;
        let currentQuestions = [];

        async function loadQuestions(page = 1) {
            try {
                const searchQuery = document.getElementById('searchInput').value;
                const url = new URL('/api/questions', window.location.origin);
                url.searchParams.set('page', page);
                url.searchParams.set('page_size', pageSize);
                if (searchQuery) {
                    url.searchParams.set('search', searchQuery);
                }
                
                const response = await fetch(url);
                const result = await response.json();
                
                currentQuestions = result.questions;
                currentPage = result.page;
                pageSize = result.page_size;
                totalPages = result.total_pages;
                totalCount = result.total;
                
                renderTable();
            } catch (error) {
                showToast('加载问题失败', 'error');
            }
        }

        function renderTable() {
            const tbody = document.getElementById('questionsTable');
            const emptyState = document.getElementById('emptyState');
            const pagination = document.getElementById('pagination');

            if (currentQuestions.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                pagination.style.display = 'none';
                updateHeaderActions();
                return;
            }

            emptyState.style.display = 'none';
            pagination.style.display = 'flex';
            document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页 (${totalCount} 条)`;
            document.getElementById('prevBtn').disabled = currentPage === 1;
            document.getElementById('nextBtn').disabled = currentPage >= totalPages;

            tbody.innerHTML = currentQuestions.map(q => {
                const isSelected = selectedIds.includes(q.id);
                return `
                    <tr ${isSelected ? 'class="selected"' : ''}>
                        <td class="checkbox-cell">
                            <label class="checkbox-wrapper">
                                <input type="checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${q.id})">
                            </label>
                        </td>
                        <td style="font-weight: 500;">${escapeHtml(q.question)}</td>
                        <td style="color: var(--gray-500);">${escapeHtml(q.answer.substring(0, 60))}${q.answer.length > 60 ? '...' : ''}</td>
                        <td>${q.category ? `<span class="category-tag">${escapeHtml(q.category)}</span>` : '-'}</td>
                        <td class="actions">
                            <button class="btn btn-primary btn-sm" onclick="editQuestion(${q.id})">编辑</button>
                            <button class="btn btn-danger btn-sm" onclick="deleteQuestion(${q.id})">删除</button>
                        </td>
                    </tr>
                `;
            }).join('');

            updateHeaderActions();
        }

        function filterTable() {
            currentPage = 1;
            selectedIds = [];
            document.getElementById('selectAll').checked = false;
            loadQuestions(1);
        }

        function toggleSelect(id) {
            const index = selectedIds.indexOf(id);
            if (index > -1) {
                selectedIds.splice(index, 1);
            } else {
                selectedIds.push(id);
            }
            updateHeaderActions();
        }

        function toggleSelectAll() {
            const checkbox = document.getElementById('selectAll');
            if (checkbox.checked) {
                selectedIds = currentQuestions.map(q => q.id);
            } else {
                selectedIds = [];
            }
            renderTable();
        }

        function clearSelection() {
            selectedIds = [];
            document.getElementById('selectAll').checked = false;
            updateHeaderActions();
        }

        function updateHeaderActions() {
            const actions = document.getElementById('headerActions');
            const count = document.getElementById('selectedCount');
            
            if (selectedIds.length > 0) {
                actions.style.display = 'flex';
                count.textContent = selectedIds.length;
            } else {
                actions.style.display = 'none';
            }
        }

        async function batchDelete() {
            if (selectedIds.length === 0) return;
            document.getElementById('deleteCount').textContent = selectedIds.length;
            document.getElementById('confirmModal').classList.add('active');
        }

        async function confirmDelete() {
            try {
                for (const id of selectedIds) {
                    await fetch(`/api/questions/${id}`, { method: 'DELETE' });
                }
                showToast(`成功删除 ${selectedIds.length} 个问题`, 'success');
                selectedIds = [];
                document.getElementById('selectAll').checked = false;
                closeConfirmModal();
                loadQuestions(currentPage);
            } catch (error) {
                showToast('删除失败', 'error');
            }
        }

        function closeConfirmModal() {
            document.getElementById('confirmModal').classList.remove('active');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加问题';
            document.getElementById('questionForm').reset();
            document.getElementById('questionId').value = '';
            document.getElementById('questionModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('questionModal').classList.remove('active');
            editingId = null;
        }

        async function editQuestion(id) {
            try {
                const question = currentQuestions.find(q => q.id === id);
                if (question) {
                    editingId = id;
                    document.getElementById('modalTitle').textContent = '编辑问题';
                    document.getElementById('questionId').value = id;
                    document.getElementById('question').value = question.question;
                    document.getElementById('answer').value = question.answer;
                    document.getElementById('category').value = question.category || '';
                    document.getElementById('questionModal').classList.add('active');
                }
            } catch (error) {
                showToast('加载问题失败', 'error');
            }
        }

        async function deleteQuestion(id) {
            document.getElementById('deleteCount').textContent = '1';
            selectedIds = [id];
            document.getElementById('confirmModal').classList.add('active');
        }

        async function seedQuestions() {
            try {
                await fetch('/api/seed', { method: 'POST' });
                loadQuestions(1);
                showToast('示例数据添加成功！', 'success');
            } catch (error) {
                showToast('添加失败', 'error');
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                loadQuestions(currentPage - 1);
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                loadQuestions(currentPage + 1);
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                bottom: 24px;
                right: 24px;
                padding: 14px 20px;
                border-radius: 10px;
                color: white;
                font-size: 14px;
                font-weight: 500;
                box-shadow: 0 4px 20px rgba(0,0,0,0.15);
                z-index: 2000;
                animation: slideIn 0.3s ease;
            `;
            toast.style.background = type === 'success' ? '#10b981' : '#ef4444';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100px); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100px); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        document.getElementById('questionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const data = {
                question: document.getElementById('question').value,
                answer: document.getElementById('answer').value,
                category: document.getElementById('category').value
            };

            try {
                if (editingId) {
                    await fetch(`/api/questions/${editingId}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    showToast('修改成功', 'success');
                } else {
                    await fetch('/api/questions', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    showToast('添加成功', 'success');
                }
                closeModal();
                loadQuestions(currentPage);
            } catch (error) {
                showToast('保存失败', 'error');
            }
        });

        loadQuestions(1);
    </script>
</body>
</html>
